<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0d0d0d"/>
  <circle cx="330" cy="65" r="52" fill="#1a1a2e" opacity="0.7"/>
  <circle cx="60" cy="340" r="42" fill="#1a1a2e" opacity="0.6"/>
  <!-- Central phone/content screen -->
  <rect x="155" y="70" width="90" height="165" rx="14" fill="#1e1b30" stroke="#7c6aaa" stroke-width="2.5"/>
  <rect x="162" y="80" width="76" height="130" rx="8" fill="#12102a"/>
  <!-- Phone notch -->
  <rect x="186" y="72" width="28" height="7" rx="4" fill="#0d0d0d"/>
  <!-- Content inside phone -->
  <rect x="166" y="84" width="68" height="30" rx="5" fill="#7c6aaa" opacity="0.6"/>
  <rect x="166" y="118" width="68" height="8" rx="3" fill="#c4b8dc" opacity="0.5"/>
  <rect x="166" y="130" width="48" height="6" rx="3" fill="#7c6aaa" opacity="0.4"/>
  <rect x="166" y="142" width="55" height="6" rx="3" fill="#5b7bc4" opacity="0.4"/>
  <!-- Like/heart button -->
  <text x="168" y="175" font-size="14" fill="#e05a5a">♥</text>
  <text x="185" y="175" font-size="14" fill="#5b7bc4">💬</text>
  <text x="202" y="175" font-size="14" fill="#f5c518">↗</text>
  <!-- Engagement numbers -->
  <rect x="166" y="180" width="30" height="5" rx="2" fill="#c4b8dc" opacity="0.4"/>
  <rect x="166" y="190" width="50" height="5" rx="2" fill="#7c6aaa" opacity="0.3"/>
  <!-- Floating social icons left -->
  <rect x="50" y="130" width="70" height="48" rx="10" fill="#1e1b30" stroke="#5b7bc4" stroke-width="1.5"/>
  <rect x="58" y="138" width="22" height="22" rx="6" fill="#5b7bc4" opacity="0.7"/>
  <rect x="64" y="143" width="10" height="12" rx="2" fill="white" opacity="0.5"/>
  <rect x="86" y="140" width="28" height="6" rx="3" fill="#c4b8dc" opacity="0.6"/>
  <rect x="86" y="150" width="20" height="5" rx="2" fill="#7c6aaa" opacity="0.5"/>
  <rect x="86" y="160" width="24" height="5" rx="2" fill="#5b7bc4" opacity="0.4"/>
  <!-- Floating analytics card right -->
  <rect x="280" y="130" width="80" height="65" rx="10" fill="#1e1b30" stroke="#7c6aaa" stroke-width="1.5"/>
  <rect x="288" y="140" width="18" height="40" rx="3" fill="#5b4f8a"/>
  <rect x="310" y="150" width="18" height="30" rx="3" fill="#7c6aaa"/>
  <rect x="332" y="145" width="18" height="35" rx="3" fill="#f5c518"/>
  <!-- Trend arrow on analytics -->
  <polyline points="288,158 306,148 328,153 348,138" fill="none" stroke="#f5c518" stroke-width="2" stroke-linecap="round"/>
  <!-- Person left -->
  <circle cx="88" cy="260" r="22" fill="#5b7bc4"/>
  <rect x="70" y="285" width="36" height="48" rx="8" fill="#3a5499"/>
  <rect x="62" y="290" width="14" height="30" rx="6" fill="#3a5499"/>
  <!-- Arm with pencil up -->
  <rect x="98" y="268" width="35" height="10" rx="5" fill="#3a5499" transform="rotate(-25 115 273)"/>
  <rect x="128" y="248" width="8" height="22" rx="3" fill="#f5c518" transform="rotate(-25 132 259)"/>
  <!-- Person right with laptop -->
  <circle cx="316" cy="268" r="22" fill="#f5c518"/>
  <rect x="298" y="293" width="36" height="45" rx="8" fill="#c4960a"/>
  <rect x="290" y="298" width="14" height="28" rx="6" fill="#c4960a"/>
  <rect x="272" y="318" width="60" height="6" rx="3" fill="#3a3a5a"/>
  <rect x="277" y="298" width="50" height="32" rx="5" fill="#1e1b30" stroke="#7c6aaa" stroke-width="1"/>
  <rect x="282" y="303" width="40" height="22" rx="3" fill="#12102a"/>
  <rect x="285" y="307" width="34" height="4" rx="2" fill="#7c6aaa" opacity="0.7"/>
  <rect x="285" y="315" width="24" height="3" rx="2" fill="#5b7bc4" opacity="0.5"/>
  <!-- Light bulb floating -->
  <circle cx="200" cy="48" r="20" fill="#f5c518" opacity="0.9"/>
  <rect x="193" y="66" width="14" height="10" rx="3" fill="#c4960a"/>
  <path d="M192 48 Q200 35 208 48" fill="none" stroke="white" stroke-width="2"/>
  <!-- Plants -->
  <rect x="22" y="360" width="7" height="15" rx="3" fill="#3a5a3a"/>
  <ellipse cx="26" cy="350" rx="10" ry="13" fill="#4a7a4a" opacity="0.8"/>
  <rect x="368" y="360" width="7" height="15" rx="3" fill="#3a5a3a"/>
  <ellipse cx="372" cy="350" rx="10" ry="13" fill="#4a7a4a" opacity="0.8"/>
</svg>
