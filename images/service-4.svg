  <line x1="160" y1="130" x2="284" y2="130" stroke="#f5c518" stroke-width="3" stroke-linecap="round"/>
  <polygon points="286,130 272,123 272,137" fill="#f5c518"/>
  <polygon points="160,130 172,122 168,130 172,138" fill="#c4b8dc"/>
