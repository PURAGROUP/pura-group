  <rect x="52" y="120" width="60" height="45" rx="6" fill="#1e1b30" stroke="#7c6aaa" stroke-width="1"/>
  <rect x="58" y="128" width="12" height="28" rx="3" fill="#5b4f8a"/>
  <rect x="74" y="135" width="12" height="21" rx="3" fill="#7c6aaa"/>
  <rect x="90" y="125" width="12" height="31" rx="3" fill="#f5c518"/>
