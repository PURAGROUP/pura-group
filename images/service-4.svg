  <rect x="228" y="238" width="74" height="20" rx="4" fill="#7c6aaa" opacity="0.5"/>
  <rect x="228" y="264" width="50" height="6" rx="3" fill="#c4b8dc" opacity="0.6"/>
  <rect x="228" y="275" width="35" height="5" rx="2" fill="#5b7bc4" opacity="0.4"/>
  <!-- Small floating card -->
  <rect x="50" y="310" width="70" height="46" rx="6" fill="#1e1b30" stroke="#5b7bc4" stroke-width="1.5"/>
  <rect x="57" y="317" width="56" height="15" rx="3" fill="#5b7bc4" opacity="0.5"/>
  <rect x="57" y="337" width="38" height="5" rx="2" fill="#c4b8dc" opacity="0.5"/>
  <rect x="57" y="347" width="28" height="5" rx="2" fill="#7c6aaa" opacity="0.4"/>
