  <rect x="76" y="275" width="12" height="36" rx="5" fill="#2a3d7a"/>
  <rect x="92" y="275" width="12" height="36" rx="5" fill="#2a3d7a"/>
  <!-- Plants -->
  <rect x="20" y="358" width="8" height="18" rx="3" fill="#3a5a3a"/>
  <ellipse cx="24" cy="346" rx="11" ry="15" fill="#4a7a4a" opacity="0.8"/>
  <rect x="368" y="358" width="8" height="18" rx="3" fill="#3a5a3a"/>
