<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0d0d0d"/>
  <circle cx="60" cy="80" r="50" fill="#1a1a2e" opacity="0.7"/>
  <circle cx="340" cy="330" r="45" fill="#1a1a2e" opacity="0.6"/>
  <!-- Large monitor/screen -->
  <rect x="80" y="90" width="240" height="165" rx="10" fill="#1e1b30" stroke="#7c6aaa" stroke-width="2.5"/>
  <rect x="88" y="98" width="224" height="149" rx="6" fill="#12102a"/>
  <!-- Monitor stand -->
  <rect x="188" y="255" width="24" height="24" rx="3" fill="#2a2a4a"/>
  <rect x="160" y="278" width="80" height="10" rx="5" fill="#3a3a5a"/>
  <!-- Screen content - browser bar -->
  <rect x="88" y="98" width="224" height="20" rx="6" fill="#2a2750"/>
  <circle cx="100" cy="108" r="4" fill="#e05a5a"/>
  <circle cx="114" cy="108" r="4" fill="#f5c518"/>
  <circle cx="128" cy="108" r="4" fill="#5ac45a"/>
  <rect x="150" y="103" width="120" height="10" rx="5" fill="#1a1840" stroke="#7c6aaa" stroke-width="1"/>
  <!-- Screen content - layout blocks -->
  <rect x="96" y="126" width="208" height="30" rx="4" fill="#7c6aaa" opacity="0.5"/>
  <rect x="96" y="162" width="96" height="70" rx="4" fill="#3a3a6a"/>
  <rect x="198" y="162" width="106" height="30" rx="4" fill="#2a2a4a"/>
  <rect x="198" y="198" width="106" height="14" rx="3" fill="#2a2a4a" opacity="0.7"/>
  <rect x="198" y="218" width="70" height="14" rx="3" fill="#2a2a4a" opacity="0.5"/>
  <!-- Code snippets floating -->
  <rect x="30" y="160" width="55" height="10" rx="3" fill="#5b7bc4" opacity="0.7"/>
  <rect x="30" y="176" width="40" height="8" rx="3" fill="#7c6aaa" opacity="0.6"/>
  <rect x="30" y="190" width="50" height="8" rx="3" fill="#5b7bc4" opacity="0.5"/>
  <!-- Person left -->
  <circle cx="75" cy="305" r="22" fill="#5b7bc4"/>
  <rect x="57" y="330" width="36" height="45" rx="8" fill="#3a5499"/>
  <rect x="49" y="335" width="14" height="30" rx="6" fill="#3a5499"/>
  <!-- Arm up to screen -->
  <rect x="85" y="310" width="40" height="10" rx="5" fill="#3a5499" transform="rotate(-30 105 315)"/>
  <!-- Gear -->
  <circle cx="65" cy="225" r="18" fill="none" stroke="#7c6aaa" stroke-width="2.5"/>
  <circle cx="65" cy="225" r="8" fill="#7c6aaa"/>
  <rect x="61" y="204" width="8" height="10" rx="3" fill="#7c6aaa"/>
  <rect x="61" y="237" width="8" height="10" rx="3" fill="#7c6aaa"/>
  <rect x="44" y="221" width="10" height="8" rx="3" fill="#7c6aaa"/>
  <rect x="77" y="221" width="10" height="8" rx="3" fill="#7c6aaa"/>
  <!-- Person right sitting -->
  <circle cx="328" cy="295" r="20" fill="#f5c518"/>
  <rect x="312" y="318" width="32" height="40" rx="8" fill="#c4960a"/>
  <!-- Laptop -->
  <rect x="290" y="340" width="70" height="8" rx="3" fill="#3a3a5a"/>
  <rect x="295" y="318" width="60" height="38" rx="5" fill="#1e1b30" stroke="#7c6aaa" stroke-width="1.5"/>
  <rect x="300" y="323" width="50" height="28" rx="3" fill="#12102a"/>
  <rect x="304" y="327" width="42" height="4" rx="2" fill="#7c6aaa" opacity="0.7"/>
  <rect x="304" y="335" width="30" height="3" rx="2" fill="#5b7bc4" opacity="0.6"/>
  <rect x="304" y="342" width="36" height="3" rx="2" fill="#7c6aaa" opacity="0.5"/>
  <!-- Rocket -->
  <rect x="340" y="120" width="20" height="50" rx="10" fill="#c4b8dc" transform="rotate(-20 350 145)"/>
  <polygon points="350,110 340,135 360,135" fill="#7c6aaa" transform="rotate(-20 350 145)"/>
  <ellipse cx="345" cy="163" rx="7" ry="5" fill="#f5c518" transform="rotate(-20 350 145)"/>
  <!-- Plants -->
  <rect x="22" y="355" width="8" height="20" rx="3" fill="#3a5a3a"/>
  <ellipse cx="26" cy="342" rx="12" ry="16" fill="#4a7a4a" opacity="0.8"/>
  <rect x="368" y="360" width="8" height="15" rx="3" fill="#3a5a3a"/>
  <ellipse cx="372" cy="348" rx="10" ry="14" fill="#4a7a4a" opacity="0.7"/>
</svg>
