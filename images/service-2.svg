<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#0d0d0d"/>
  <circle cx="330" cy="70" r="55" fill="#1a1a2e" opacity="0.7"/>
  <circle cx="50" cy="320" r="45" fill="#1a1a2e" opacity="0.6"/>
  <!-- Large canvas/paper -->
  <rect x="120" y="80" width="180" height="220" rx="10" fill="#1e1b30" stroke="#7c6aaa" stroke-width="2"/>
  <!-- Logo sketch on canvas -->
  <circle cx="210" cy="160" r="38" fill="none" stroke="#7c6aaa" stroke-width="3"/>
  <circle cx="210" cy="160" r="22" fill="#7c6aaa" opacity="0.4"/>
  <text x="196" y="166" font-family="serif" font-size="18" fill="#c4b8dc" font-weight="bold">PG</text>
  <!-- Color swatches -->
  <rect x="140" y="230" width="20" height="20" rx="4" fill="#7c6aaa"/>
  <rect x="166" y="230" width="20" height="20" rx="4" fill="#5b7bc4"/>
  <rect x="192" y="230" width="20" height="20" rx="4" fill="#f5c518"/>
  <rect x="218" y="230" width="20" height="20" rx="4" fill="#c4b8dc"/>
  <rect x="244" y="230" width="20" height="20" rx="4" fill="#3a3a5a"/>
  <!-- Typography lines -->
  <rect x="140" y="262" width="100" height="6" rx="3" fill="#c4b8dc" opacity="0.6"/>
  <rect x="140" y="274" width="70" height="4" rx="2" fill="#7c6aaa" opacity="0.5"/>
  <!-- Person with palette -->
  <circle cx="88" cy="175" r="22" fill="#f5c518"/>
  <rect x="70" y="200" width="36" height="52" rx="8" fill="#c4960a"/>
  <rect x="62" y="206" width="14" height="34" rx="6" fill="#c4960a"/>
  <!-- Arm extended to canvas -->
  <rect x="98" y="204" width="28" height="10" rx="5" fill="#c4960a"/>
  <!-- Palette -->
  <ellipse cx="130" cy="208" rx="16" ry="12" fill="#2a2a4a" stroke="#7c6aaa" stroke-width="1.5"/>
  <circle cx="122" cy="204" r="4" fill="#7c6aaa"/>
  <circle cx="132" cy="202" r="4" fill="#f5c518"/>
  <circle cx="140" cy="207" r="4" fill="#5b7bc4"/>
  <circle cx="128" cy="214" r="4" fill="#c4b8dc"/>
  <!-- Pen/brush -->
  <rect x="300" y="100" width="8" height="60" rx="3" fill="#c4b8dc" transform="rotate(30 304 130)"/>
  <polygon points="304,160 300,175 312,162" fill="#f5c518" transform="rotate(30 304 130)"/>
  <!-- Stars sparkle -->
  <text x="310" y="200" font-size="20" fill="#f5c518">✦</text>
  <text x="60" y="130" font-size="14" fill="#7c6aaa">✦</text>
  <text x="340" y="280" font-size="12" fill="#5b7bc4">✦</text>
  <!-- Floating text elements -->
  <rect x="300" y="220" width="70" height="12" rx="4" fill="#1e1b30" stroke="#7c6aaa" stroke-width="1"/>
  <rect x="300" y="238" width="50" height="8" rx="3" fill="#1e1b30" stroke="#5b4f8a" stroke-width="1"/>
  <!-- Plant right -->
  <rect x="360" y="345" width="8" height="30" rx="3" fill="#3a5a3a"/>
  <ellipse cx="364" cy="330" rx="13" ry="18" fill="#4a7a4a" opacity="0.8"/>
  <!-- Plant left -->
  <rect x="28" y="355" width="8" height="20" rx="3" fill="#3a5a3a"/>
  <ellipse cx="32" cy="343" rx="11" ry="15" fill="#4a7a4a" opacity="0.8"/>
  <!-- Legs person -->
  <rect x="74" y="250" width="12" height="35" rx="5" fill="#a07c0a"/>
  <rect x="90" y="250" width="12" height="35" rx="5" fill="#a07c0a"/>
</svg>
